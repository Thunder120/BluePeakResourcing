<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Növaîr | Scent, Curated by Friends</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Babel for JSX Support -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ES Modules Import Map for React, Three.js, Framer Motion -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "three": "https://esm.sh/three@0.158.0",
        "@react-three/fiber": "https://esm.sh/@react-three/fiber@8.15.12?external=react,react-dom,three",
        "@react-three/drei": "https://esm.sh/@react-three/drei@9.96.1?external=react,react-dom,three,@react-three/fiber",
        "framer-motion": "https://esm.sh/framer-motion@10.18.0?external=react"
      }
    }
  </script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            midnight: '#020617',
            'midnight-light': '#0f172a',
            ice: '#e0f2fe',
            silver: '#cbd5e1',
            gold: '#d4af37',
          },
          fontFamily: {
            sans: ['Poppins', 'sans-serif'],
            display: ['Quicksand', 'sans-serif'],
          }
        }
      }
    }
  </script>

  <style>
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #020617; }
    ::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }

    /* Neon Text Effect */
    .neon-text {
      text-shadow: 0 0 5px #e0f2fe, 0 0 10px #93c5fd, 0 0 20px #3b82f6, 0 0 40px #1d4ed8;
    }
    .neon-gold {
      text-shadow: 0 0 5px #d4af37, 0 0 10px #b8941f, 0 0 20px #8a6d12;
    }
    .neon-box {
      box-shadow: 0 0 10px rgba(147, 197, 253, 0.5), 0 0 20px rgba(59, 130, 246, 0.3);
      border: 1px solid rgba(224, 242, 254, 0.3);
    }

    /* Loader Styles */
    #loader {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background-color: #020617; color: #e0f2fe;
      font-family: 'Quicksand', sans-serif; font-size: 1.5rem; letter-spacing: 2px;
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #d4af37; border-radius: 50%;
      animation: spin 1s linear infinite; margin-right: 15px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-midnight text-ice font-sans antialiased overflow-x-hidden">
  
  <!-- Loading Screen -->
  <div id="loader">
    <div class="spinner"></div> Loading Növaîr...
  </div>

  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useRef, useState, useEffect, Suspense } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Canvas, useFrame } from '@react-three/fiber';
    import { motion } from 'framer-motion';
    import * as THREE from 'three';

    // ==========================================
    // IMPORTANT: PASTE YOUR REAL PDF DATA HERE
    // ==========================================
    const productData = [
      { name: "Baccarat Rouge 540", price: "₹18,500", image: "https://images.unsplash.com/photo-1541643600914-78b084683601?q=80&w=1000&auto=format&fit=crop" },
      { name: "Creed Aventus", price: "₹22,000", image: "https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?q=80&w=1000&auto=format&fit=crop" },
      { name: "Tom Ford Tobacco Vanille", price: "₹24,500", image: "https://images.unsplash.com/photo-1588405748880-12d1d2a59d75?q=80&w=1000&auto=format&fit=crop" },
      { name: "Parfums de Marly Layton", price: "₹16,000", image: "https://images.unsplash.com/photo-1534644347588-7a4dfc6715d0?q=80&w=1000&auto=format&fit=crop" },
      { name: "Maison Francis Kurkdjian Oud", price: "₹21,000", image: "https://images.unsplash.com/photo-1594035910387-fea47794261f?q=80&w=1000&auto=format&fit=crop" }
    ];

    // WebGL Checker for Fallback
    function isWebGLAvailable() {
      try {
        const canvas = document.createElement('canvas');
        return !!(window.WebGLRenderingContext && (canvas.getContext('webgl') || canvas.getContext('experimental-webgl')));
      } catch (e) { return false; }
    }

    // 3D Perfume Bottle Component
    const PerfumeBottle3D = () => {
      const groupRef = useRef();
      
      useFrame((state) => {
        if(groupRef.current) {
          // Smooth mouse tracking rotation
          groupRef.current.rotation.y += (state.pointer.x * 0.5 - groupRef.current.rotation.y) * 0.05;
          groupRef.current.rotation.x += (state.pointer.y * 0.2 - groupRef.current.rotation.x) * 0.05;
          // Slow idle rotation
          groupRef.current.rotation.y += 0.002;
        }
      });

      return (
        <group ref={groupRef} scale={1.5}>
          {/* Bottle Body */}
          <mesh position={[0, 0, 0]}>
            <cylinderGeometry args={[1, 1, 2.5, 32]} />
            <meshPhysicalMaterial color="#0f172a" metalness={0.3} roughness={0.1} transmission={0.9} thickness={1.5} transparent opacity={0.9} />
          </mesh>
          {/* Liquid Inside */}
          <mesh position={[0, -0.5, 0]}>
            <cylinderGeometry args={[0.9, 0.9, 1.2, 32]} />
            <meshStandardMaterial color="#d4af37" transparent opacity={0.8} />
          </mesh>
          {/* Neck */}
          <mesh position={[0, 1.5, 0]}>
            <cylinderGeometry args={[0.3, 0.4, 0.5, 32]} />
            <meshStandardMaterial color="#1e293b" metalness={0.8} roughness={0.2} />
          </mesh>
          {/* Cap */}
          <mesh position={[0, 2, 0]}>
            <cylinderGeometry args={[0.35, 0.35, 0.6, 32]} />
            <meshStandardMaterial color="#d4af37" metalness={1} roughness={0.1} />
          </mesh>
        </group>
      );
    };

    // Hero Section
    const Hero = () => {
      const webglAvailable = isWebGLAvailable();
      return (
        <section className="relative h-screen w-full flex flex-col items-center justify-center overflow-hidden">
           {/* Ambient Lights */}
           <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600/20 rounded-full blur-[120px]"></div>
           <div className="absolute bottom-1/4 right-1/4 w-96 h-96 bg-yellow-600/10 rounded-full blur-[120px]"></div>

           <motion.div 
             initial={{ opacity: 0, y: -20 }} 
             animate={{ opacity: 1, y: 0 }} 
             transition={{ duration: 1.2 }}
             className="absolute top-10 z-20 text-center"
           >
             <h1 className="font-display text-6xl md:text-8xl font-bold tracking-widest text-ice neon-text">NÖVAÎR</h1>
             <p className="text-silver tracking-[0.3em] uppercase text-sm md:text-base mt-2">Scent, Curated by Friends</p>
           </motion.div>

           <div className="absolute inset-0 flex items-center justify-center">
             {webglAvailable ? (
               <Canvas camera={{ position: [0, 0, 6], fov: 50 }}>
                 <ambientLight intensity={0.5} />
                 <spotLight position={[10, 10, 10]} angle={0.15} penumbra={1} intensity={2} color="#ffffff" />
                 <pointLight position={[-10, -10, -5]} intensity={1.5} color="#3b82f6" />
                 <Suspense fallback={null}>
                   <PerfumeBottle3D />
                 </Suspense>
               </Canvas>
             ) : (
               <div className="w-full h-full flex items-center justify-center bg-midnight-light">
                 <img src={productData[0].image} alt="Hero Perfume" className="max-h-[60vh] object-contain opacity-80" />
               </div>
             )}
           </div>

           <motion.div 
             initial={{ opacity: 0 }} 
             animate={{ opacity: 1 }} 
             transition={{ delay: 1.5, duration: 1 }}
             className="absolute bottom-10 z-20 text-center"
           >
             <p className="text-silver text-lg md:text-xl italic font-light">"A rotating selection of premium and designer perfumes."</p>
             <div className="mt-6 animate-bounce text-ice text-2xl">↓</div>
           </motion.div>
        </section>
      );
    };

    // Product Card
    const ProductCard = ({ product }) => {
      return (
        <motion.div 
          whileHover={{ rotateY: 10, rotateX: 5, scale: 1.05 }}
          transition={{ type: "spring", stiffness: 300 }}
          style={{ transformStyle: 'preserve-3d', perspective: 1000 }}
          className="relative w-72 h-96 flex-shrink-0 rounded-xl overflow-hidden border border-slate-700/50 bg-midnight-light shadow-2xl mx-4"
        >
          <div className="absolute inset-0 bg-gradient-to-t from-midnight via-midnight/40 to-transparent z-10"></div>
          <img src={product.image} alt={product.name} className="absolute inset-0 w-full h-full object-cover object-top transition-transform duration-700 ease-out hover:scale-110" />
          <div className="absolute bottom-0 left-0 right-0 p-6 z-20">
            <h3 className="font-display text-xl font-semibold text-ice mb-1">{product.name}</h3>
            <p className="text-gold text-lg font-bold neon-gold">{product.price}</p>
          </div>
        </motion.div>
      );
    };

    // Product Showcase
    const Showcase = () => {
      return (
        <section className="py-24 px-4 md:px-12 relative">
          <motion.h2 
            initial={{ opacity: 0, y: 50 }} 
            whileInView={{ opacity: 1, y: 0 }} 
            viewport={{ once: true, amount: 0.5 }}
            transition={{ duration: 0.8 }}
            className="font-display text-4xl md:text-6xl text-center text-ice mb-16 tracking-wide"
          >
            The Collection
          </motion.h2>
          
          <div className="flex overflow-x-auto pb-12 space-x-4 md:space-x-8 justify-start md:justify-center snap-x snap-mandatory no-scrollbar">
            {productData.map((product, idx) => (
              <div key={idx} className="snap-center">
                <ProductCard product={product} />
              </div>
            ))}
          </div>
        </section>
      );
    };

    // Limited Stock Banner
    const LimitedBanner = () => {
      return (
        <section className="py-16 px-4 flex justify-center">
          <motion.div 
            initial={{ opacity: 0, scale: 0.8 }} 
            whileInView={{ opacity: 1, scale: 1 }} 
            viewport={{ once: true }}
            transition={{ duration: 0.8 }}
            className="w-full max-w-4xl p-10 md:p-14 text-center rounded-2xl neon-box bg-midnight-light/50 backdrop-blur-sm"
          >
            <h2 className="font-display text-3xl md:text-5xl font-bold text-ice neon-text tracking-wider">
              Limited Stock
            </h2>
            <p className="text-silver text-xl md:text-2xl mt-4 font-light tracking-wide">
              DM to Order
            </p>
          </motion.div>
        </section>
      );
    };

    // Founders Section
    const Founders = () => {
      const founders = [
        { name: "Ayaan", bio: "With a nose for oud and amber, Ayaan hunts down the rarest Middle Eastern fragrances.", img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?q=80&w=1000&auto=format&fit=crop" },
        { name: "Ansh", bio: "Obsessed with fresh, citrus, and designer aesthetics, Ansh brings the modern icons to the table.", img: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?q=80&w=1000&auto=format&fit=crop" }
      ];

      return (
        <section className="py-24 px-4 md:px-12 bg-gradient-to-b from-midnight to-midnight-light">
          <motion.h2 
            initial={{ opacity: 0 }} 
            whileInView={{ opacity: 1 }} 
            viewport={{ once: true }}
            transition={{ duration: 1 }}
            className="font-display text-4xl md:text-6xl text-center text-ice mb-16 tracking-wide"
          >
            Meet the Founders
          </motion.h2>
          
          <div className="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-12">
            {founders.map((f, idx) => (
              <motion.div 
                key={idx}
                initial={{ opacity: 0, y: 50 }}
                whileInView={{ opacity: 1, y: 0 }}
                viewport={{ once: true }}
                transition={{ duration: 0.8, delay: idx * 0.2 }}
                whileHover={{ y: -10 }}
                className="bg-midnight-light/50 p-8 rounded-2xl border border-slate-700/50 flex flex-col items-center text-center backdrop-blur-sm shadow-xl"
              >
                <div className="w-32 h-32 rounded-full overflow-hidden border-4 border-gold mb-6 shadow-glow-blue">
                  <img src={f.img} alt={f.name} className="w-full h-full object-cover" />
                </div>
                <h3 className="font-display text-3xl text-ice mb-3">{f.name}</h3>
                <p className="text-silver leading-relaxed">{f.bio}</p>
              </motion.div>
            ))}
          </div>
        </section>
      );
    };

    // Contact Section
    const Contact = () => {
      return (
        <section className="py-24 px-4 text-center">
          <motion.h2 
            initial={{ opacity: 0, y: 30 }} 
            whileInView={{ opacity: 1, y: 0 }} 
            viewport={{ once: true }}
            transition={{ duration: 0.8 }}
            className="font-display text-4xl md:text-6xl text-ice mb-8 tracking-wide"
          >
            Secure Your Scent
          </motion.h2>
          
          <div className="flex flex-col md:flex-row gap-6 justify-center items-center">
            <motion.a 
              href="#" 
              whileHover={{ scale: 1.05, boxShadow: "0 0 20px rgba(147, 197, 253, 0.6)" }}
              className="px-10 py-4 rounded-full border border-ice/50 text-ice flex items-center gap-3 hover:bg-ice/10 transition-colors"
            >
              <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>
              Instagram
            </motion.a>
            <motion.a 
              href="#" 
              whileHover={{ scale: 1.05, boxShadow: "0 0 20px rgba(34, 197, 94, 0.6)" }}
              className="px-10 py-4 rounded-full bg-green-500/10 border border-green-500/50 text-green-400 flex items-center gap-3 hover:bg-green-500/20 transition-colors"
            >
              <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.434 9.889-9.885.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.434-9.889 9.884-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.981zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/></svg>
              WhatsApp
            </motion.a>
          </div>
        </section>
      );
    };

    // Main App
    const App = () => {
      // Remove loader when app mounts
      useEffect(() => {
        const loader = document.getElementById('loader');
        if (loader) loader.style.display = 'none';
      }, []);

      return (
        <div className="w-full min-h-screen relative">
          {/* Subtle grid background overlay */}
          <div className="fixed inset-0 bg-[linear-gradient(to_right,#1e293b10_1px,transparent_1px),linear-gradient(to_bottom,#1e293b10_1px,transparent_1px)] bg-[size:4rem_4rem] pointer-events-none z-0"></div>
          
          <div className="relative z-10">
            <Hero />
            <Showcase />
            <LimitedBanner />
            <Founders />
            <Contact />
            
            <footer className="py-10 text-center text-slate-500 text-sm border-t border-slate-800">
              <p>© {new Date().getFullYear()} Növaîr. Crafted with passion.</p>
            </footer>
          </div>
        </div>
      );
    };

    // Render to DOM
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
